name: Release Fission Server

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      description:
        description: Release description
        required: false
        type: string
        default: ""
      draft:
        description: Create as a draft release
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark as a pre-release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-fission-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: fission-server-linux-x86_64
            artifact_filename: fission-server-linux-x86_64
            configure_args: -G Ninja -DCMAKE_BUILD_TYPE=Release
            binary_path: build/Fission.Server
            install_deps: sudo apt-get update && sudo apt-get install -y ninja-build
            setup_windows_toolchain: false

          - os: windows-latest
            artifact: fission-server-windows-x86_64
            artifact_filename: fission-server-windows-x86_64.exe
            configure_args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
            binary_path: build/Fission.Server.exe
            install_deps: echo "Using preinstalled LLVM/Clang toolchain"
            setup_windows_toolchain: true

          - os: macos-15
            artifact: fission-server-macos-arm64
            artifact_filename: fission-server-macos-arm64
            configure_args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
            binary_path: build/Fission.Server
            install_deps: brew install ninja
            setup_windows_toolchain: false

          - os: macos-15-intel
            artifact: fission-server-macos-x86_64
            artifact_filename: fission-server-macos-x86_64
            configure_args: -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
            binary_path: build/Fission.Server
            install_deps: brew install ninja
            setup_windows_toolchain: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ${{ matrix.install_deps }}

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.6"

      - name: Setup Windows toolchain
        if: matrix.setup_windows_toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=OFF -DUSE_CCACHE=OFF ${{ matrix.configure_args }}

      - name: Build
        run: cmake --build build --config Release --target Fission.Server --parallel

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_filename }}"
          chmod +x dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fission-server-*
          merge-multiple: true
          path: dist

      - name: List release assets
        run: ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Fission Server ${{ inputs.tag }}
          body: ${{ inputs.description }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: dist/*
